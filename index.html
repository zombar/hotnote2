<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hotnote</title>

    <!-- Favicon & PWA -->
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-512.png">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="hotnote">
    <meta name="theme-color" content="#252525">

    <!-- SEO & Social -->
    <meta name="description" content="Minimalist local-first code and markdown editor. Works directly with your filesystem — no backend, no account, no cloud.">

    <!-- Open Graph (Facebook, LinkedIn, Discord, Slack, …) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://app.hotnote.io/">
    <meta property="og:title" content="hotnote — local-first code &amp; markdown editor">
    <meta property="og:description" content="Minimalist local-first code and markdown editor. Works directly with your filesystem — no backend, no account, no cloud.">
    <meta property="og:image" content="https://app.hotnote.io/preview.jpg">
    <meta property="og:image:type" content="image/jpeg">

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://app.hotnote.io/">
    <meta name="twitter:title" content="hotnote — local-first code &amp; markdown editor">
    <meta name="twitter:description" content="Minimalist local-first code and markdown editor. Works directly with your filesystem — no backend, no account, no cloud.">
    <meta name="twitter:image" content="https://app.hotnote.io/preview.jpg">

    <link rel="stylesheet" href="css/style.css">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="bc47a3ae-96b5-4c31-9863-c6b27d72f0f4" data-tag="app"></script>
    <script>
        // Apply saved theme immediately to prevent flash
        (function() {
            var t = localStorage.getItem('hotnote2-theme') ||
                (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
            document.documentElement.setAttribute('data-theme', t);
        })();
        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</head>
<body>
<div id="app">
    <header>
        <div class="header-left">
            <span class="logo">hotnote</span>
            <button class="btn btn-sm btn-icon" id="sidebar-toggle" title="Toggle sidebar" aria-label="Toggle sidebar">
                <svg id="sidebar-toggle-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </button>
            <button class="btn" id="open-folder" title="Open a local folder">Open Folder</button>
        </div>
        <div class="header-right">
            <label class="autosave-toggle" id="autosave-toggle-label" title="Automatically save changes after 2 seconds of inactivity">
                <input type="checkbox" id="autosave-checkbox" class="pill-toggle" aria-label="Autosave" />
                <span id="autosave-label">autosave</span>
            </label>
            <button class="btn btn-sm btn-icon" id="save-btn" disabled title="Save file (Ctrl+S / Cmd+S)" aria-label="Save file">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            </button>
            <a class="btn btn-sm btn-icon hide-mobile" href="https://github.com/zombar/hotnote2"
               target="_blank" rel="noopener noreferrer"
               title="Review the code" aria-label="Review the code on GitHub">
              <svg width="14" height="14" viewBox="0 0 98 96" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z"/>
              </svg>
            </a>
            <button class="btn btn-sm btn-icon" id="help-btn" title="Help">?</button>
            <button class="btn btn-sm btn-icon" id="theme-toggle" title="Toggle light/dark theme" aria-label="Toggle light/dark theme">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
        </div>
    </header>
    <div id="update-banner" style="display:none" role="status" aria-live="polite">
        <span>New version available.</span>
        <button class="btn btn-sm" id="update-banner-reload">Reload</button>
        <button class="btn btn-sm btn-icon" id="update-banner-dismiss" title="Dismiss" aria-label="Dismiss update notification">×</button>
    </div>
    <div id="resume-prompt" style="display:none">
        <span>Continue with <strong class="resume-folder-name"></strong>?</span>
        <button class="btn btn-sm" id="resume-open-btn">Resume</button>
        <button class="btn btn-sm btn-icon" id="resume-dismiss-btn" title="Dismiss" aria-label="Dismiss">×</button>
    </div>
    <main>
        <aside id="sidebar">
            <div id="sidebar-toolbar">
                <button class="btn btn-sm btn-icon" id="new-file-btn" title="New file" aria-label="New file">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/><line x1="12" y1="13" x2="12" y2="19"/><line x1="9" y1="16" x2="15" y2="16"/></svg>
                </button>
                <button class="btn btn-sm btn-icon" id="new-folder-btn" title="New folder" aria-label="New folder">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
                </button>
                <button class="btn btn-sm btn-icon" id="search-btn" title="Search files" aria-label="Search files">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="6.5" cy="6.5" r="4"/><line x1="10" y1="10" x2="14" y2="14"/></svg>
                </button>
                <button class="btn btn-sm btn-icon" id="split-pane-btn" title="Toggle split pane" aria-label="Toggle split pane">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
                </button>
                <button class="btn btn-sm btn-icon" id="back-btn" disabled title="Back" aria-label="Back">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <button class="btn btn-sm btn-icon" id="forward-btn" disabled title="Forward" aria-label="Forward">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
            </div>
            <div id="search-panel" class="hidden">
                <div id="search-input-row">
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="6.5" cy="6.5" r="4"/><line x1="10" y1="10" x2="14" y2="14"/></svg>
                    <input id="search-input" type="text" placeholder="Search files…" autocomplete="off" spellcheck="false"/>
                </div>
                <div id="search-exclude-row">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                    <input id="search-exclude" type="text" placeholder="Exclude: *.log, node_modules" autocomplete="off" spellcheck="false"/>
                </div>
                <label id="search-content-label">
                    <input id="search-content-toggle" type="checkbox" class="pill-toggle"/>
                    <span>Search content</span>
                </label>
            </div>
            <ul id="file-list"></ul>
            <div id="git-filter-bar" style="display:none">
                <label id="git-filter-label">
                    <input type="checkbox" id="git-filter-checkbox" class="pill-toggle">
                    <span><span class="git-change-count">0</span> changes</span>
                </label>
            </div>
        </aside>
        <div id="resize-handle"></div>
        <div id="editor-container">
            <section class="pane" id="pane1">
                <div id="mode-toolbar" style="display:none"></div>
                <div id="source-editor-wrap">
                    <div id="line-numbers" aria-hidden="true"></div>
                    <div id="source-editor-overlay" aria-hidden="true"></div>
                    <div id="source-editor-ce" contenteditable="true" spellcheck="false"
                         autocorrect="off" autocapitalize="off"
                         role="textbox" aria-multiline="true" aria-label="Source editor"></div>
                    <textarea id="source-editor" style="display:none" tabindex="-1" aria-hidden="true"></textarea>
                </div>
                <div id="wysiwyg" contenteditable="false"></div>
                <div id="s3-datasheet" style="display:none"></div>
                <div id="s3-treeview" style="display:none"></div>
                <div id="image-viewer" style="display:none"></div>
                <div id="diff-view" style="display:none"></div>
            </section>
            <div id="split-resize-handle" style="display:none"></div>
            <section class="pane" id="pane2" style="display:none">
                <div id="mode-toolbar-p2"></div>
                <div id="source-editor-wrap-p2">
                    <div id="line-numbers-p2" aria-hidden="true"></div>
                    <div id="source-editor-overlay-p2" aria-hidden="true"></div>
                    <div id="source-editor-ce-p2" contenteditable="true" spellcheck="false"
                         autocorrect="off" autocapitalize="off"
                         role="textbox" aria-multiline="true" aria-label="Source editor pane 2"></div>
                    <textarea id="source-editor-p2" style="display:none" tabindex="-1" aria-hidden="true"></textarea>
                </div>
                <div id="wysiwyg-p2" contenteditable="false"></div>
                <div id="s3-datasheet-p2" style="display:none"></div>
                <div id="s3-treeview-p2" style="display:none"></div>
                <div id="image-viewer-p2" style="display:none"></div>
                <div id="diff-view-p2" style="display:none"></div>
            </section>
        </div>
    </main>
</div>

<!-- Nested Data Modal -->
<div class="modal-overlay" id="nested-modal">
    <div class="modal-box">
        <div class="modal-header">
            <button class="btn btn-sm btn-icon" id="nested-modal-back" title="Back" aria-label="Back" style="display:none">←</button>
            <span class="modal-title" id="nested-title">Nested Data</span>
            <button class="btn btn-sm btn-icon" id="nested-modal-close" title="Close" aria-label="Close">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body" id="nested-body"></div>
    </div>
</div>

<div id="toast-container"></div>

<script src="js/lib-format.js"></script>
<script src="js/lib-markdown.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/url-state.js"></script>
<script src="js/highlight.js"></script>
<script src="js/json-views.js"></script>
<script src="js/autosave.js"></script>
<script src="js/split-pane.js"></script>
<script src="js/ui.js"></script>
<script src="js/git.js"></script>
<script src="js/diff.js"></script>
<script src="js/editor.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/source-editor.js"></script>
<script src="js/help.js"></script>
<script src="js/init.js"></script>
</body>
</html>
