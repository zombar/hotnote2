<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hotnote</title>

    <!-- Favicon & PWA -->
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-512.png">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="hotnote">
    <meta name="theme-color" content="#252525">

    <!-- SEO & Social -->
    <meta name="description" content="Minimalist online code editor with local filesystem access. No build step, no backend — runs entirely in the browser.">

    <!-- Open Graph (Facebook, LinkedIn, Discord, Slack, …) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hotnote.io/">
    <meta property="og:title" content="hotnote — local-first code &amp; markdown editor">
    <meta property="og:description" content="Minimalist online code editor with local filesystem access. No build step, no backend — runs entirely in the browser.">
    <meta property="og:image" content="https://hotnote.io/preview.jpg">
    <meta property="og:image:type" content="image/jpeg">

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://hotnote.io/">
    <meta name="twitter:title" content="hotnote — local-first code &amp; markdown editor">
    <meta name="twitter:description" content="Minimalist online code editor with local filesystem access. No build step, no backend — runs entirely in the browser.">
    <meta name="twitter:image" content="https://hotnote.io/preview.jpg">

    <link rel="stylesheet" href="css/style.css">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="bc47a3ae-96b5-4c31-9863-c6b27d72f0f4"></script>
    <script>
        // Apply saved theme immediately to prevent flash
        (function() {
            var t = localStorage.getItem('hotnote2-theme') ||
                (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
            document.documentElement.setAttribute('data-theme', t);
        })();
        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</head>
<body>
<div id="app">
    <header>
        <div class="header-left">
            <span class="logo">hotnote</span>
            <button class="btn btn-sm btn-icon" id="sidebar-toggle" title="Toggle sidebar" aria-label="Toggle sidebar">
                <svg id="sidebar-toggle-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </button>
            <button class="btn" id="open-folder" title="Open a local folder">Open Folder</button>
        </div>
        <div class="header-right">
            <label class="autosave-toggle" id="autosave-toggle-label" title="Automatically save changes after 2 seconds of inactivity">
                <input type="checkbox" id="autosave-checkbox" aria-label="Autosave" />
                <span id="autosave-label">autosave</span>
            </label>
            <button class="btn btn-sm btn-icon" id="save-btn" disabled title="Save file (Ctrl+S / Cmd+S)" aria-label="Save file">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            </button>
            <button class="btn btn-sm btn-icon" id="theme-toggle" title="Toggle light/dark theme" aria-label="Toggle light/dark theme">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
        </div>
    </header>
    <div id="update-banner" style="display:none" role="status" aria-live="polite">
        <span>New version available.</span>
        <button class="btn btn-sm" id="update-banner-reload">Reload</button>
        <button class="btn btn-sm btn-icon" id="update-banner-dismiss" title="Dismiss" aria-label="Dismiss update notification">×</button>
    </div>
    <div id="resume-prompt" style="display:none">
        <span>Continue with <strong class="resume-folder-name"></strong>?</span>
        <button class="btn btn-sm" id="resume-open-btn">Resume</button>
        <button class="btn btn-sm btn-icon" id="resume-dismiss-btn" title="Dismiss" aria-label="Dismiss">×</button>
    </div>
    <main>
        <aside id="sidebar">
            <div id="sidebar-toolbar">
                <button class="btn btn-sm btn-icon" id="new-file-btn" title="New file" aria-label="New file">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/><line x1="12" y1="13" x2="12" y2="19"/><line x1="9" y1="16" x2="15" y2="16"/></svg>
                </button>
                <button class="btn btn-sm btn-icon" id="new-folder-btn" title="New folder" aria-label="New folder">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
                </button>
                <button class="btn btn-sm btn-icon" id="back-btn" disabled title="Back" aria-label="Back">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <button class="btn btn-sm btn-icon" id="forward-btn" disabled title="Forward" aria-label="Forward">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
            </div>
            <ul id="file-list"></ul>
        </aside>
        <div id="resize-handle"></div>
        <section id="editor-area">
            <div id="mode-toolbar" style="display:none"></div>
            <div id="source-editor-wrap">
                <div id="line-numbers" aria-hidden="true"></div>
                <pre id="source-highlight-backdrop" aria-hidden="true"><code id="source-highlight-code"></code></pre>
                <textarea id="source-editor" spellcheck="false"></textarea>
            </div>
            <div id="wysiwyg" contenteditable="false"></div>
            <div id="s3-datasheet" style="display:none"></div>
            <div id="s3-treeview" style="display:none"></div>
            <div id="image-viewer" style="display:none"></div>
        </section>
    </main>
</div>

<!-- Nested Data Modal -->
<div class="modal-overlay" id="nested-modal">
    <div class="modal-box">
        <div class="modal-header">
            <span class="modal-title" id="nested-title">Nested Data</span>
            <button class="btn btn-sm btn-icon" id="nested-modal-close" title="Close" aria-label="Close">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body" id="nested-body"></div>
    </div>
</div>

<script src="js/lib-format.js"></script>
<script src="js/lib-markdown.js"></script>
<script src="js/hotnote.js"></script>
</body>
</html>
